    <h1>Generar Factura</h1>

    <form action="procesar_factura.php" method="POST">

        <h2>Datos del Cliente</h2>

        <label for="nombre_cliente">Nombre del Cliente:</label><br>
        <input type="text" id="nombre_cliente" name="nombre_cliente" required><br><br>

        <label for="correo_cliente">Correo:</label><br>
        <input type="email" id="correo_cliente" name="correo_cliente" required><br><br>

        <h2>Datos del Producto / Servicio</h2>

        <label for="descripcion">Descripción:</label><br>
        <input type="text" id="descripcion" name="descripcion" required><br><br>

        <label for="cantidad">Cantidad:</label><br>
        <input type="number" id="cantidad" name="cantidad" required><br><br>

        <label for="precio">Precio Unitario:</label><br>
        <input type="number" step="0.01" id="precio" name="precio" required><br><br>

        <h2>Información Adicional</h2>

        <label for="fecha">Fecha:</label><br>
        <input type="date" id="fecha" name="fecha" required><br><br>

        <label for="metodo_pago">Método de Pago:</label><br>
        <select id="metodo_pago" name="metodo_pago">
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="transferencia">Transferencia</option>
        </select><br><br>

        <button type="submit">Generar Factura</button>

    </form>
</body>
</html>
